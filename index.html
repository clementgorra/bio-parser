<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Parser Bilan Bio</title>
<style>
body { font-family: Arial; max-width: 900px; margin: auto; padding: 20px; }
textarea { width: 100%; height: 200px; }
pre { background: #f4f4f4; padding: 15px; white-space: pre-wrap; }
button { padding: 10px 20px; margin-top: 10px; }
</style>
</head>

<body>

<h2>Parser de bilan biologique</h2>

<textarea id="input" placeholder="Colle ton bilan ici..."></textarea>
<br>
<button onclick="runParser()">Analyser bilan</button>

<h3>Résultat :</h3>
<pre id="output"></pre>

<script>

// =====================
// 1. PARSE TEXTE → TABLE
// =====================
function parseTable(raw) {
    const lines = raw.split("\n");

    return lines
        .map(l => l.trim())
        .filter(l => l !== "")
        .filter(l => !/^\d/.test(l)) // ignore notes
        .filter(l => !/^_+$/.test(l)) // ignore séparateurs
        .filter(l => !l.toUpperCase().includes("TECHNIQUE"))
        .filter(l => !l.toUpperCase().includes("REMARQUE"))
        .map(l => l.split("¦").map(c => c.trim()));
}


// =====================
// 2. MAPPING
// =====================
const MAPPING = {

    hb: ["Hémoglobine"],
    vgm: ["Volume globulaire moyen"],
    plaquettes: ["Plaquettes"],
    leucocytes: ["Leucocytes"],
    pnn: ["Polynucléaires neutrophiles"],

    ph: ["pH (corrigé par la température)"],
    po2: ["pO2 (corrigé par la température)"],
    pco2: ["pCO2 (corrigé par la température)"],
    bicarbonates_gaz: ["Bicarbonates (c)"],
    lactates: ["Acide lactique"],

    sodium: ["Sodium", "Sodium sur sang artériel"],
    potassium: ["Potassium", "Potassium sur sang artériel"],
    chlore: ["Chlore", "Chlore sur sang artériel"],
    calcemie: ["Calcium", "Ca2+"],
    bicarbonates: ["Bicarbonates"],
    protides: ["Protéines", "Protéines totales"],
    albumine: ["Albumine"],
    glucose: ["Glucose", "Glucose sur sang artériel"],
    osmolarite: ["Osmolarité"],

    uree: ["Urée"],
    creatinine: ["Créatinine"],
    dfg: ["DFGe", "DFG"],

    crp: ["CRP"],

    ferritine: ["Ferritine"],
    transferrine: ["Transferrine"],

    cpk: ["CK", "CK totale"],

    troponine: ["Troponine"],
    ntprobnp: ["NT-PROBNP"],
    d_dimere: ["D Dimères", "D-Dimères"],

    inr: ["INR"],
    tp: ["Taux de Prothrombine"],
    tca: ["Ratio du TCA"],

    tgo: ["TGO"],
    tgp: ["TGP"],
    pal: ["Phosphatases alcalines"],
    ggt: ["Gamma GT"],
    bilirubine_totale: ["Bilirubine totale"],
    bilirubine_directe: ["Bilirubine directe"],

    lipase: ["Lipase"],
    tsh: ["TSH"],

    vitamine_b9: ["Vitamine B9"],
    vitamine_b12: ["Vitamine B12"],
    vitamine_d: ["Vitamine D"]
};


// =====================
// 3. EXTRACTION VALEUR
// =====================
function findValue(table, labels) {

    for (let row of table) {
        const firstCell = row[0] || "";

        for (let label of labels) {

            if (firstCell.toLowerCase().includes(label.toLowerCase())) {

                // récup toutes les valeurs numériques de la ligne
                const numbers = row.join(" ").match(/-?\d+[.,]?\d*/g);

                if (numbers) {
                    return numbers[numbers.length - 1].replace(",", ".");
                }
            }
        }
    }

    return "";
}


// =====================
// 4. EXTRACTION COMPLETE
// =====================
function extractAll(table) {

    const result = {};

    for (let key in MAPPING) {
        result[key] = findValue(table, MAPPING[key]);
    }

    return result;
}


// =====================
// 5. GENERATION TEXTE FINAL
// =====================
function generateOutput(d) {

return `
Numération formule sanguine :
            - hémoglobine à ${d.hb} g/dL    
            - VGM à ${d.vgm} fl            
            - plaquettes à ${d.plaquettes} G/L               
            - leucocytes à ${d.leucocytes} G/L
            - dont ${d.pnn} % de PNN 

Gazométrie :
            - pH à ${d.ph}        
            - pO2 à ${d.po2} mmHg        
            - pCO2 à ${d.pco2} mmHg        
            - Bicarbonates à ${d.bicarbonates_gaz} mmol/l
            - Lactates à ${d.lactates} mmol/l

Ionogramme :
            - natrémie à ${d.sodium} mmol/l          
            - kaliémie à ${d.potassium} mmol/l
            - chlore à ${d.chlore} mmol/l
            - calcémie à ${d.calcemie} mmol/l 
            - bicarbonates à ${d.bicarbonates} mmol/l  
            - protides à ${d.protides} g/l
- albumine ${d.albumine} g/l 
            - glucose à ${d.glucose} mmol/l 
            - osmolarité à ${d.osmolarite} mmol/l 

Fonction rénale : 
            - urée à ${d.uree} µmol/l
            - créatinine à ${d.creatinine} µmol/l
            - débit de filtration glomérulaire à ${d.dfg} ml/mn

- CRP à ${d.crp} mg/l

Bilan martial :
            - Ferritine : ${d.ferritine} µg/l
            - Transferrine : ${d.transferrine}

- CPK à ${d.cpk} UI/l

Enzyme cardiaque : 
            - Troponine à ${d.troponine} ng/L
            - NT-proBNP à ${d.ntprobnp} pg/ml
            - D-dimères à ${d.d_dimere} ng/ml

Bilan d'hémostase
            - INR à ${d.inr}
            - TP ${d.tp}
            - TCA à ${d.tca}   

Bilan hépatique 
            - TGO à ${d.tgo} UI/l
            - TGP à ${d.tgp} UI/l
            - phosphatases alcalines à ${d.pal} UI/l 
            - gamma GT à ${d.ggt} UI/l
            - bilirubine totale à ${d.bilirubine_totale} µmol/l
            - bilirubine directe à ${d.bilirubine_directe} µmol/l 

- Lipase à ${d.lipase} UI/l 
- TSH à ${d.tsh} µUI/l

- Bilan vitaminique : 
            - vitamine B9 : ${d.vitamine_b9} ng/l
            - vitamine B12 : ${d.vitamine_b12} pg/ml
            - Vitamine D : ${d.vitamine_d} ng/l
`;
}


// =====================
// 6. PIPELINE GLOBAL
// =====================
function runParser() {

    const raw = document.getElementById("input").value;

    const table = parseTable(raw);

    const data = extractAll(table);

    const output = generateOutput(data);

    document.getElementById("output").textContent = output;
}

</script>

</body>
</html>
